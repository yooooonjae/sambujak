<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>부동산 연구 3부작 — OG</title>
<style>
  /* 1200×630 OG 카드 — 세 색 미감(순환 금·시차 적청·수지 주황), 외부 자산 0 */
  :root{
    --paper:#f2f0ea; --surface:#fbfaf6;
    --ink:#1f2226; --ink-2:#575b62; --ink-3:#8b8e95;
    --hairline:#e6e2d8; --hairline-2:#d8d3c6;
    --gold:#9c7818; --gold-wash:#f4ecd6;
    --orange:#c2410c; --orange-wash:#fbe8dc;
    --red:#cf1f2b; --blue:#1748c8; --rb-wash:#eeeefb;
    --font-display:"Songti SC","Songti TC","AppleMyungjo","Nanum Myeongjo","Noto Serif KR",serif;
    --font-body:"Apple SD Gothic Neo","Pretendard","Noto Sans KR",-apple-system,sans-serif;
    --font-num:"Avenir Next","Helvetica Neue",ui-monospace,"SF Mono",Menlo,monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{width:1200px; height:630px; overflow:hidden; background:var(--paper)}
  body{font-family:var(--font-body); color:var(--ink); -webkit-font-smoothing:antialiased}
  .og{position:relative; width:1200px; height:630px; background:
      radial-gradient(120% 90% at 85% -10%, rgba(23,72,200,.05), transparent 55%),
      radial-gradient(120% 90% at 100% 120%, rgba(194,65,12,.05), transparent 50%),
      var(--paper);
      padding:60px 72px 56px; display:flex; flex-direction:column}
  .bar{display:flex; height:5px; border-radius:4px; overflow:hidden; width:132px; margin-bottom:30px}
  .bar i{flex:1}
  .bar .g{background:var(--gold)} .bar .rb{background:linear-gradient(90deg,var(--red),var(--blue))} .bar .o{background:var(--orange)}

  .content{flex:1; display:flex; align-items:center; gap:36px}
  .left{flex:1; min-width:0}
  .eyebrow{font-size:20px; font-weight:800; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-3); margin-bottom:18px}
  .title{font-family:var(--font-display); font-weight:600; font-size:88px; line-height:1.02; letter-spacing:-.01em; color:var(--ink)}
  .title .tri{background:linear-gradient(96deg,var(--gold) 8%,var(--red) 46%,var(--blue) 60%,var(--orange) 92%); -webkit-background-clip:text; background-clip:text; color:transparent}
  .method{font-family:var(--font-display); font-size:27px; line-height:1.55; color:var(--ink-2); margin:26px 0 34px; max-width:19em}
  .method b{font-weight:600}
  .method .g{color:var(--gold)} .method .rb{color:var(--blue)} .method .o{color:var(--orange)}

  .seals{display:flex; gap:16px}
  .seal{display:flex; flex-direction:column; align-items:center; gap:5px;
        width:150px; padding:16px 10px 14px; border-radius:14px; background:var(--surface);
        border:1px solid var(--hairline); box-shadow:0 10px 26px -20px rgba(30,32,38,.5)}
  .seal .hj{font-family:var(--font-display); font-weight:600; font-size:38px; letter-spacing:.04em}
  .seal .lb{font-weight:800; font-size:17px; color:var(--ink)}
  .seal .ro{font-size:13.5px; color:var(--ink-3); letter-spacing:.02em}
  .seal.g{border-color:color-mix(in srgb,var(--gold) 26%,var(--hairline))} .seal.g .hj{color:var(--gold)}
  .seal.o{border-color:color-mix(in srgb,var(--orange) 26%,var(--hairline))} .seal.o .hj{color:var(--orange)}
  .seal.rb{border-color:color-mix(in srgb,var(--blue) 26%,var(--hairline))}
  .seal.rb .hj{background:linear-gradient(92deg,var(--red),var(--blue)); -webkit-background-clip:text; background-clip:text; color:transparent}

  .right{width:300px; height:300px; flex:none; display:grid; place-items:center}
  .orbit{width:300px; height:300px}
  .orbit .ring{fill:none; stroke:var(--hairline-2); stroke-width:1.2}
  .orbit .core{font-family:var(--font-display); fill:var(--ink-3); font-size:30px; letter-spacing:3px}

  .foot{display:flex; align-items:baseline; justify-content:space-between; padding-top:24px; border-top:1px solid var(--hairline)}
  .foot .dom{font-family:var(--font-num); font-size:24px; font-weight:600; color:var(--ink)}
  .foot .sub{font-family:var(--font-display); font-size:18px; letter-spacing:.04em; color:var(--ink-3)}
</style>
</head>
<body>
  <div class="og">
    <div class="bar"><i class="g"></i><i class="rb"></i><i class="o"></i></div>
    <div class="content">
      <div class="left">
        <p class="eyebrow">부동산 연구 · 통합 의사결정 시스템</p>
        <h1 class="title">부동산 연구 <span class="tri">3부작</span></h1>
        <p class="method"><b class="g">순환</b>에서 구조를 보고, <b class="rb">시차</b>에서 전달시간을 재고, <b class="o">수지</b>에서 손익으로 환산한다.</p>
        <div class="seals">
          <div class="seal g"><span class="hj">循環</span><span class="lb">순환</span><span class="ro">시장의 구조</span></div>
          <div class="seal rb"><span class="hj">視差·時差</span><span class="lb">시차</span><span class="ro">전달시간</span></div>
          <div class="seal o"><span class="hj">收支</span><span class="lb">수지</span><span class="ro">개별 손익</span></div>
        </div>
      </div>
      <div class="right">
        <svg class="orbit" viewBox="0 0 320 320" aria-hidden="true">
          <ellipse class="ring" cx="160" cy="160" rx="132" ry="132"/>
          <ellipse class="ring" cx="160" cy="160" rx="96" ry="96"/>
          <ellipse class="ring" cx="160" cy="160" rx="60" ry="60"/>
          <circle cx="160" cy="28" r="10" fill="#9c7818"/>
          <circle cx="256" cy="160" r="9.5" fill="#cf1f2b"/><path d="M256 150.5 a9.5 9.5 0 0 1 0 19 z" fill="#1748c8"/>
          <circle cx="160" cy="220" r="9" fill="#c2410c"/>
          <text class="core" x="160" y="170" text-anchor="middle">三部作</text>
        </svg>
      </div>
    </div>
    <div class="foot">
      <span class="dom">sambujak.pages.dev</span>
      <span class="sub">循環 sunhwan · 視差·時差 sicha · 收支 yoonjae</span>
    </div>
  </div>
</body>
</html>
