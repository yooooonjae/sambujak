name: link-contract

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 링크·자산·og.png 계약 검사
        run: node tests/check_links.js

      - name: root ↔ web 미러 해시 동일성
        run: |
          fail=0
          for f in index.html robots.txt og.png; do
            a=$(sha256sum "$f" | cut -d' ' -f1)
            b=$(sha256sum "web/$f" | cut -d' ' -f1)
            if [ "$a" != "$b" ]; then
              echo "✗ $f ≠ web/$f"; echo "    root=$a"; echo "    web =$b"; fail=1
            else
              echo "✓ $f == web/$f  ($a)"
            fi
          done
          [ "$fail" = 0 ] || { echo "미러 불일치 — 배포 전 web/ 재동기화(make mirror) 필요"; exit 1; }

      # ── 반응형 스모크 (외부 반응형 감사) — 5뷰포트 가로 오버플로 0·핵심 터치 타깃 ≥44px ──
      # Chrome 헤드리스(CDP, 의존성 0). ubuntu 러너 preinstall google-chrome 사용.
      # 대상은 체크아웃된 index.html. 브라우저 부재 시 자동 skip(exit 0) → 기존 CI green 유지.
      - name: Ensure Chrome (install if missing · non-blocking)
        run: |
          if command -v google-chrome >/dev/null 2>&1 || command -v chromium >/dev/null 2>&1 || command -v chromium-browser >/dev/null 2>&1; then
            echo "브라우저 존재 → 설치 생략"
          else
            sudo apt-get update -qq && sudo apt-get install -y -qq chromium || echo "설치 실패 — 반응형 검사 자동 skip"
          fi
      - name: 반응형 스모크 (다중 해상도)
        run: node tests/responsive_check.js
